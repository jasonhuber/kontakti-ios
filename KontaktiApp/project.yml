name: KontaktiApp
options:
  bundleIdPrefix: com.jasonhuber
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0
targets:
  KontaktiApp:
    type: application
    platform: iOS
    sources:
      - path: KontaktiApp
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    info:
      path: KontaktiApp/Info.plist
      properties:
        CFBundleDisplayName: Kontakti
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSContactsUsageDescription: Kontakti imports your contacts to help you track relationships.
        GIDClientID: $(GOOGLE_IOS_CLIENT_ID)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(GOOGLE_IOS_REVERSED_CLIENT_ID)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonhuber.KontaktiApp
        INFOPLIST_FILE: KontaktiApp/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GOOGLE_IOS_CLIENT_ID: 332466044306-cc6ur5d1il4g7fcpknpa51pjotupmhad.apps.googleusercontent.com
        GOOGLE_IOS_REVERSED_CLIENT_ID: com.googleusercontent.apps.332466044306-cc6ur5d1il4g7fcpknpa51pjotupmhad
